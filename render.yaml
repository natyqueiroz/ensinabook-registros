services:
  - type: web
    name: ensinabook-registros
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main_render:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ensinabook-db
          property: connectionString
      - key: ACCESS_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.7

databases:
  - name: ensinabook-db
    plan: free
    databaseName: ensinabook
    user: ensinabook

